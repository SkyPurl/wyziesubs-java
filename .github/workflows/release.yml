name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build and verify
        run: mvn clean verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-release-${{ github.sha }}
          path: target/surefire-reports/

  check-release:
    name: Check if release is needed
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      should_release: ${{ steps.decision.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📦 Detected version: $VERSION"

      - name: Decide if release is needed
        id: decision
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          ACTOR="${{ github.actor }}"

          # 1. Skip if Dependabot
          if [[ "$ACTOR" == "dependabot[bot]" || "$ACTOR" == "dependabot-preview[bot]" ]]; then
            echo "⏭️ Dependabot commit — skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 2. Skip if SNAPSHOT version
          if [[ "$VERSION" == *"-SNAPSHOT"* ]]; then
            echo "⏭️ SNAPSHOT version ($VERSION) — skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 3. Skip if tag already exists
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "⏭️ Tag $TAG already exists — skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 4. New version detected
          echo "🚀 New version $VERSION detected — triggering release"
          echo "should_release=true" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: check-release
    if: ${{ needs.check-release.outputs.should_release == 'true' }}
    permissions:
      contents: write
    outputs:
      version: ${{ needs.check-release.outputs.version }}
      tag: ${{ needs.check-release.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.check-release.outputs.tag }}" -m "Release version ${{ needs.check-release.outputs.version }}"
          git push origin "${{ needs.check-release.outputs.tag }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG="🎉 Initial release of the WyzieSubs Java SDK!"
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check-release.outputs.tag }}
          name: Release ${{ needs.check-release.outputs.version }}
          body: |
            ## 🎉 WyzieSubs Java SDK ${{ needs.check-release.outputs.version }}

            ### 📦 Maven Dependency
            ```xml
            <dependency>
                <groupId>io.github.skypurl</groupId>
                <artifactId>wyziesubs-java</artifactId>
                <version>${{ needs.check-release.outputs.version }}</version>
            </dependency>
            ```

            ### 📝 Changelog
            ${{ steps.changelog.outputs.changelog }}

            ### 🔗 Links
            - [Maven Central](https://central.sonatype.com/artifact/io.github.skypurl/wyziesubs-java/${{ needs.check-release.outputs.version }})
            - [Documentation](https://github.com/SkyPurl/wyziesubs-java#readme)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-maven:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    needs: [check-release, create-release]
    if: ${{ needs.check-release.outputs.should_release == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Deploy to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -Prelease deploy -DskipTests

      - name: Publish deployment summary
        run: |
          echo "✅ Deployment to Maven Central completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "📦 Version: ${{ needs.check-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ Tag: ${{ needs.check-release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Maven Central: https://central.sonatype.com/artifact/io.github.skypurl/wyziesubs-java/${{ needs.check-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY