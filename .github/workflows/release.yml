name: Release

on:
  push:
    branches:
      - main

jobs:
  # Job 1 : CI (tests obligatoires avant release)
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build and verify
        run: mvn clean verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-release-${{ github.sha }}
          path: target/surefire-reports/

  # Job 2 : Création de la Release GitHub (dépend de CI)
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: ci  # Attend que les tests passent
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📦 Version détectée : $VERSION"
          echo "🏷️ Tag à créer : $TAG"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.version.outputs.tag }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Le tag ${{ steps.version.outputs.tag }} existe déjà"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Le tag ${{ steps.version.outputs.tag }} n'existe pas encore"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release version ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG="🎉 Première release du SDK WyzieSubs Java !"
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🎉 WyzieSubs Java SDK ${{ steps.version.outputs.version }}

            ### 📦 Maven Dependency
            ```xml
            <dependency>
                <groupId>io.github.skypurl</groupId>
                <artifactId>wyziesubs-java</artifactId>
                <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```

            ### 📝 Changelog
            ${{ steps.changelog.outputs.changelog }}

            ### 🔗 Links
            - [Maven Central](https://central.sonatype.com/artifact/io.github.skypurl/wyziesubs-java/${{ steps.version.outputs.version }})
            - [Documentation](https://github.com/SkyPurl/wyziesubs-java#readme)

            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.tag }}...HEAD
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3 : Déploiement Maven Central (dépend de create-release)
  deploy-maven:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    needs: create-release  # Attend que la release soit créée

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Deploy to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -Prelease deploy -DskipTests

      - name: Publish deployment summary
        run: |
          echo "✅ Deployment to Maven Central completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "📦 Version: ${{ needs.create-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ Tag: ${{ needs.create-release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Maven Central: https://central.sonatype.com/artifact/io.github.skypurl/wyziesubs-java/${{ needs.create-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY